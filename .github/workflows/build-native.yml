name: Build Native Apps

on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Android — builds the Capacitor debug .apk
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android (.apk)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install Node dependencies
        run: npm install

      - name: Build frontend (root-relative paths for native)
        working-directory: frontend
        run: npx vite build --base /

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk

  # ─────────────────────────────────────────────
  # Windows — builds the Tauri .exe / .msi
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows (.exe/.msi)
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Build frontend (root-relative paths for native)
        working-directory: frontend
        run: npx vite build --base /

      - name: Patch Tauri config for CI (skip beforeBuildCommand, disable updater)
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = 'src-tauri/tauri.conf.json';
            try {
              const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
              if (!cfg.build) throw new Error('Missing build section in tauri.conf.json');
              if (!cfg.tauri || !cfg.tauri.updater) throw new Error('Missing tauri.updater section in tauri.conf.json');
              cfg.build.beforeBuildCommand = '';
              cfg.tauri.updater.active = false;
              fs.writeFileSync(p, JSON.stringify(cfg, null, 2));
              console.log('Tauri config patched successfully.');
            } catch (err) {
              console.error('Failed to patch tauri.conf.json:', err.message);
              process.exit(1);
            }
          "

      - name: Build Tauri Windows app
        run: npm run tauri:build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
