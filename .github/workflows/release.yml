name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: QuickNotes ${{ steps.version.outputs.VERSION }}
          body: |
            # QuickNotes ${{ steps.version.outputs.VERSION }}
            
            🎉 QuickNotes Release
            
            ## Features
            ✅ Full-stack note-taking application
            ✅ AI-powered text extraction
            ✅ React 18 + Vite frontend
            ✅ Express.js backend
            ✅ SQLite database
            
            ## Installation
            See [INSTALL.md](https://github.com/${{ github.repository }}/blob/main/INSTALL.md)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
